nelmio_api_doc:
    documentation:
        info:
            title: Test Task API
            description: REST API for storing and retrieving user records
            version: 1.0.0
        components:
            securitySchemes:
                ApiKeyAuth:
                    type: apiKey
                    in: header
                    name: X-API-Key
        security:
            - ApiKeyAuth: []

    areas:
        default:
            path_patterns:
                - ^/api